<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>El Globo de Historicitas</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
    }

    #globeViz {
      width: 100vw;
      height: 100vh;
    }

    .portrait-pin {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 3px solid; /* color is set dynamically per point in JS */
      background-size: cover;
      background-position: center;
      cursor: pointer;
    }
    #bookContainer {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
    }
    .page {
      background: #f4ecd8;
      padding: 20px;
      box-sizing: border-box;
      }
    #closeBook {
      position: absolute;
      top: -15px;
      right: -15px;
      z-index: 20;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: none;
      background: #8B0000;
      color: white;
      cursor: pointer;
      font-size: 16px;
    }
  </style>
</head>
<body>
  
<div id="globeViz"></div>

<div id="bookContainer" style="display: none;">
  <button id="closeBook">✕</button>
  <div class="page" data-density="hard">
    <h2>Cover</h2>
  </div>
  <div class="page">
    <p id="bookPlace"></p>
    <p id="bookDate"></p>
  </div>
  <div class="page">
    <p id="bookDescription"></p>
  </div>
</div>

<script src="data.js"></script>
<script src="//cdn.jsdelivr.net/npm/globe.gl"></script>
<script src="https://unpkg.com/page-flip@2.0.7/dist/js/page-flip.browser.js"></script>
<script>
  const myDOMElement = document.getElementById('globeViz');
 
  const myGlobe = new Globe(myDOMElement)
    .globeImageUrl('Img/Globe.jpg')
    .backgroundImageUrl('Img/Background.png')
    .htmlElementsData(anecdotePoints)
      .htmlElement(d => {
        const el = document.createElement('div');
        el.className = 'portrait-pin';
        el.style.backgroundImage = `url(${d.portraitUrl})`;
        el.style.borderColor = d.borderColor;
        el.addEventListener('click', () => {
        document.getElementById('bookPlace').textContent = d.place;
        document.getElementById('bookDate').textContent = d.date;
        document.getElementById('bookDescription').textContent = d.description;
        document.getElementById('bookContainer').style.display = 'block';
        pageFlip.turnToPage(0);
      });          
        return el;
      });
  
   const pageFlip = new St.PageFlip(document.getElementById('bookContainer'), {
    width: 250,
    height: 320
  });
  pageFlip.loadFromHTML(document.querySelectorAll('.page'));
  
  document.getElementById('closeBook').addEventListener('click', () => {
    document.getElementById('bookContainer').style.display = 'none';
  });
</script>

</body>
</html>
